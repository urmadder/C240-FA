<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Planner - Sign In</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 20% 20%, #1e1e2f, #0b0b14);
            overflow: hidden;
        }

        body::before,
        body::after {
            content: "";
            position: absolute;
            width: 600px;
            height: 600px;
            filter: blur(50px);
        }

        body::before {
            background: radial-gradient(circle, rgba(99,102,241,0.25), transparent 60%);
            top: -120px;
            left: -120px;
        }

        body::after {
            background: radial-gradient(circle, rgba(168,85,247,0.2), transparent 60%);
            bottom: -150px;
            right: -150px;
        }

        .login-card {
            position: relative;
            z-index: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px;
            padding: 45px 35px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            backdrop-filter: blur(18px);
            box-shadow: 0 25px 70px rgba(0,0,0,0.6);
        }

        .brand-logo {
            font-size: 2.4rem;
            font-weight: 800;
            background: linear-gradient(90deg, #a855f7, #3b82f6);
            color: transparent;
            background-clip: text;
            -webkit-background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .google-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 999px;
            background: #4285F4;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .google-btn:hover {
            background: #3367D6;
        }

        .footer {
            margin-top: 25px;
            font-size: 0.75rem;
            color: #64748b;
        }
    </style>
</head>

<body>

<div class="login-card">
    <h1 class="brand-logo">StudyPlanner</h1>
    <p class="subtitle">Sign in to continue your learning journey</p>

    <button id="googleBtn" class="google-btn">
        Continue with Google
    </button>

    <div class="footer">
        Secure login powered by Google
    </div>
</div>

<script type="module" src="js/login.js"></script>

</body>
</html>
