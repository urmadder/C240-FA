<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Sign-In Demo</title>
    <!-- Load the official Google Identity Services script -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

    <h2>Welcome to My Website</h2>
    
    <div style="display: block; min-height: 50px; max-width: 400px;">
        <!-- This is where the Google Sign-In Button will render -->
        <div id="googleBtn"></div>
    </div>

    <script>
        const MY_CLIENT_ID = "529281795879-6g91qb73fpo1527f4cap748r3aq4nq1n.apps.googleusercontent.com";

        // Callback function executed automatically after a user signs in
        function handleCredentialResponse(response) {
            console.log("Token received. Forwarding to secure backend for verification...");

            // SECURE: Send the token to YOUR backend server via POST
            fetch('http://localhost:5000/api/auth/google', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ token: response.credential })
            })
            .then(res => {
                if (!res.ok) throw new Error("Backend authentication failed.");
                return res.json();
            })
            .then(data => {
                if (data.success) {
                    console.log("Backend Audit Passed! User session created.");
                    alert(`Successfully Logged In Securely! Welcome, ${data.user.name}.`);
                    
                    // Now it's safe to redirect or load the application state
                    // window.location.href = "dashboard.html";
                } else {
                    alert(`Authentication failed: ${data.message}`);
                }
            })
            .catch(err => {
                console.error("Connection to backend failed:", err);
                alert("Security Error: Unable to authenticate session with the server.");
            });
        }

        window.onload = function () {
            google.accounts.id.initialize({
                client_id: MY_CLIENT_ID,
                callback: handleCredentialResponse
            });

            google.accounts.id.renderButton(
                document.getElementById("googleBtn"),
                { theme: "outline", size: "large", text: "signin_with" }
            );

            google.accounts.id.prompt(); 
        };
    </script>
</body>
</html>
