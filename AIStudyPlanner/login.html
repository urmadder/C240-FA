<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AI Study Planner</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="login-body">

    <div class="login-container">
        <div class="login-card">

            <h1>Welcome Back 👋</h1>
            <p>Sign in to continue to AI Study Planner.</p>

            <form id="loginForm">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email" required>

                <label for="password">Password</label>
                <div class="password-container">
                    <input type="password" id="password" placeholder="Enter your password" required>
                    <span id="togglePassword" style="cursor: pointer; user-select: none;">👁️</span>
                </div>

                <button type="submit">Login</button>
            </form>

            <div class="divider">
                <span>OR</span>
            </div>

            <!-- BULLETPROOF DECLARATIVE GOOGLE LOGIN CONFIGURATION -->
            <div id="g_id_onload"
               data-client_id="529281795879-6g91qb73fpo1527f4cap748r3aq4nq1n.apps.googleusercontent.com"
               data-context="signin"
               data-ux_mode="popup"
               data-callback="handleGoogleLogin"
               data-auto_prompt="false">
            </div>

            <!-- THE ACTUAL VISUAL BUTTON THAT GOOGLE AUTOMATICALLY RENDERS -->
            <div class="g_id_signin"
               data-type="standard"
               data-shape="rectangular"
               data-theme="outline"
               data-text="continue_with"
               data-size="large"
               data-width="100%"
               style="margin-top: 15px; width: 100%; display: flex; justify-content: center; min-height: 44px;">
            </div>

            <button type="button" class="github-btn" style="margin-top: 12px;">
                <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg" alt="GitHub logo">
                Continue with GitHub
            </button>

            <p class="bottom-text">
                Don't have an account? <a href="register.html">Register</a>
            </p>

        </div>
    </div>

    <!-- Clear, non-async Google Library script -->
    <script src="https://accounts.google.com/gsi/client"></script>
    <!-- Your login script containing ONLY UI actions and token decode -->
    <script src="js/login.js?v=3"></script>

</body>
</html>
