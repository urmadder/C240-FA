<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Planner - Sign In</title>
    <!-- Load the official Google Identity Services script -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        /* Modern CSS Reset & Variable Tokens */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle at 50% 50%, #1e1e2f 0%, #0f0f1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Glassmorphism Auth Card Container */
        .login-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        /* Typography Styles */
        .brand-logo {
        font-size: 2.2rem;
        font-weight: 700;
        color: #a855f7; /* Fallback color for older browsers */
        background: linear-gradient(45deg, #a855f7, #3b82f6);
        -webkit-background-clip: text;
        background-clip: text; /* Standard unprefixed property */
        -webkit-text-fill-color: transparent;
        margin-bottom: 8px;
        letter-spacing: -0.5px;
        }       
        .subtitle {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-bottom: 35px;
        }

        /* Clean Structural Layout footprint for Google Button alignment */
        .btn-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 50px;
            width: 100%;
            margin-top: 10px;
        }

        /* Subtle terms footer inside card */
        .footer-text {
            margin-top: 30px;
            font-size: 0.75rem;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h1 class="brand-logo">StudyPlanner</h1>
        <p class="subtitle">Sign in to sync your academic dashboard</p>
        
        <!-- Clean layout boundary constraints to prevent GSI_LOGGER footprint errors -->
        <div class="btn-wrapper">
            <div id="googleBtn"></div>
        </div>

        <p class="footer-text">Secured by Google Identity Services</p>
    </div>

    <script>
        const MY_CLIENT_ID = "529281795879-6g91qb73fpo1527f4cap748r3aq4nq1n.apps.googleusercontent.com";

        function parseJwt(token) {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));

            return JSON.parse(jsonPayload);
        }

        function handleCredentialResponse(response) {
            console.log("Token received. Checking validity via Google Cloud endpoint...");

            const googleVerificationUrl = `https://oauth2.googleapis.com/tokeninfo?id_token=${encodeURIComponent(response.credential)}`;

            fetch(googleVerificationUrl)
            .then(res => {
                if (!res.ok) throw new Error("Google API rejected the token signature.");
                return res.json();
            })
            .then(payload => {
                if (payload.aud === MY_CLIENT_ID) {
                    console.log("Token verified securely by Google cloud endpoints.");
                    alert(`Welcome, ${payload.name}! Logged in successfully on GitHub Pages.`);
                    // window.location.href = "dashboard.html";
                } else {
                    alert("Security check failed: Client ID mismatch.");
                }
            })
            .catch(err => {
                console.error("Verification failed:", err);
                alert("Error: Unable to verify login authenticity with Google.");
            });
        }

        window.onload = function () {
            google.accounts.id.initialize({
                client_id: MY_CLIENT_ID,
                callback: handleCredentialResponse
            });

            // Render option properties configured explicitly to look awesome against a dark mode container
            google.accounts.id.renderButton(
                document.getElementById("googleBtn"),
                { 
                    theme: "filled_blue", 
                    size: "large", 
                    text: "signin_with",
                    shape: "pill"
                }
            );

            google.accounts.id.prompt(); 
        };
    </script>
</body>
</html>
