<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Planner - Sign In</title>

    <!-- FIX: removed onload -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 20% 20%, #1e1e2f, #0b0b14);
            overflow: hidden;
        }

        body::before, body::after {
            content: "";
            position: absolute;
            width: 600px;
            height: 600px;
            filter: blur(50px);
        }

        body::before {
            background: radial-gradient(circle, rgba(99,102,241,0.25), transparent 60%);
            top: -120px;
            left: -120px;
        }

        body::after {
            background: radial-gradient(circle, rgba(168,85,247,0.2), transparent 60%);
            bottom: -150px;
            right: -150px;
        }

        .login-card {
            position: relative;
            z-index: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px;
            padding: 45px 35px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            backdrop-filter: blur(18px);
            box-shadow: 0 25px 70px rgba(0,0,0,0.6);
        }

        .brand-logo {
            font-size: 2.4rem;
            font-weight: 800;
            background: linear-gradient(90deg,#a855f7,#3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        #googleBtn {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }

        .footer {
            margin-top: 25px;
            font-size: 0.75rem;
            color: #64748b;
        }
    </style>
</head>

<body>

<div class="login-card">
    <h1 class="brand-logo">StudyPlanner</h1>
    <p class="subtitle">Sign in to continue your learning journey</p>

    <div id="googleBtn"></div>

    <div class="footer">
        Secure login powered by Google
    </div>
</div>

<script>
const CLIENT_ID = "529281795879-6g91qb73fpo1527f4cap748r3aq4nq1n.apps.googleusercontent.com";

/* Decode JWT */
function parseJwt(token) {
    const base64Url = token.split('.')[1];
    const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
    return JSON.parse(atob(base64));
}

/* LOGIN CALLBACK */
function handleCredentialResponse(response) {
    sessionStorage.setItem("google_token", response.credential);

    const user = parseJwt(response.credential);
    console.log("Logged in:", user.email);

    alert("Login successful!");

    window.location.href = "dashboard.html";
}

/* FIX: safe init after page fully loads */
window.addEventListener("load", () => {
    if (!window.google) {
        console.error("Google script not loaded");
        return;
    }

    google.accounts.id.initialize({
        client_id: CLIENT_ID,
        callback: handleCredentialResponse
    });

    google.accounts.id.renderButton(
        document.getElementById("googleBtn"),
        {
            theme: "filled_blue",
            size: "large",
            shape: "pill"
        }
    );

    google.accounts.id.prompt();
});
</script>

</body>
</html>
