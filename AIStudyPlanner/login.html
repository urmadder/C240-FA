<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Planner - Sign In</title>

    <script src="https://accounts.google.com/gsi/client" async defer onload="initGoogle()"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle at 50% 50%, #1e1e2f 0%, #0f0f1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .brand-logo {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(45deg,#a855f7,#3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 30px;
        }
    </style>
</head>

<body>

<div class="login-card">
    <h1 class="brand-logo">StudyPlanner</h1>
    <p class="subtitle">Sign in to continue</p>

    <div id="googleBtn"></div>
</div>

<script>
const CLIENT_ID = "529281795879-6g91qb73fpo1527f4cap748r3aq4nq1n.apps.googleusercontent.com";

/* Decode JWT (Google ID token) */
function parseJwt(token) {
    const base64Url = token.split('.')[1];
    const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
    const jsonPayload = decodeURIComponent(atob(base64).split('').map(c =>
        '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
    ).join(''));

    return JSON.parse(jsonPayload);
}

/* Login callback */
function handleCredentialResponse(response) {
    const user = parseJwt(response.credential);

    // basic validation (frontend only)
    if (user.aud !== CLIENT_ID || user.iss !== "https://accounts.google.com") {
        alert("Invalid login token");
        return;
    }

    console.log("User:", user);

    // store login state (simple frontend session)
    localStorage.setItem("user", JSON.stringify(user));

    alert(`Welcome ${user.name}`);
}

/* Safe init AFTER Google loads */
function initGoogle() {
    if (!window.google) {
        console.error("Google script not loaded");
        return;
    }

    google.accounts.id.initialize({
        client_id: CLIENT_ID,
        callback: handleCredentialResponse
    });

    google.accounts.id.renderButton(
        document.getElementById("googleBtn"),
        {
            theme: "filled_blue",
            size: "large",
            shape: "pill"
        }
    );

    google.accounts.id.prompt();
}
</script>

</body>
</html>
