<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Sign-In Demo</title>
    <!-- Load the official Google Identity Services script -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

    <h2>Welcome to My Website</h2>
    
    <div style="display: block; min-height: 50px; max-width: 400px;">
        <div id="googleBtn"></div>
    </div>

    <script>
        const MY_CLIENT_ID = "529281795879-6g91qb73fpo1527f4cap748r3aq4nq1n.apps.googleusercontent.com";

        function parseJwt(token) {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));

            return JSON.parse(jsonPayload);
        }

        function handleCredentialResponse(response) {
            console.log("Token received. Testing directly on GitHub Pages via Google Cloud endpoint...");

            // Hit Google's official verification engine directly from the browser
            const googleVerificationUrl = `https://oauth2.googleapis.com/tokeninfo?id_token=${encodeURIComponent(response.credential)}`;

            fetch(googleVerificationUrl)
            .then(res => {
                if (!res.ok) throw new Error("Google API rejected the token signature.");
                return res.json();
            })
            .then(payload => {
                if (payload.aud === MY_CLIENT_ID) {
                    console.log("Token verified securely by Google cloud endpoints.");
                    alert(`Welcome, ${payload.name}! Logged in successfully on GitHub Pages.`);
                    // window.location.href = "dashboard.html";
                } else {
                    alert("Security check failed: Client ID mismatch.");
                }
            })
            .catch(err => {
                console.error("Verification failed:", err);
                alert("Error: Unable to verify login authenticity with Google.");
            });
        }

        window.onload = function () {
            google.accounts.id.initialize({
                client_id: MY_CLIENT_ID,
                callback: handleCredentialResponse
            });

            google.accounts.id.renderButton(
                document.getElementById("googleBtn"),
                { theme: "outline", size: "large", text: "signin_with" }
            );

            google.accounts.id.prompt(); 
        };
    </script>
</body>
</html>
