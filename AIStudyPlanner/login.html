<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Planner - Sign In</title>

    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer onload="initGoogle()"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle at 50% 50%, #1e1e2f 0%, #0f0f1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .brand-logo {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(45deg,#a855f7,#3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 30px;
        }
    </style>
</head>

<body>

<div class="login-card">
    <h1 class="brand-logo">StudyPlanner</h1>
    <p class="subtitle">Sign in to continue</p>

    <div id="googleBtn"></div>
</div>

<script>
const CLIENT_ID = "529281795879-6g91qb73fpo1527f4cap748r3aq4nq1n.apps.googleusercontent.com";

/* LOGIN CALLBACK */
function handleCredentialResponse(response) {
    console.log("Google login success");

    // response.credential = Google ID token (JWT)
    // We DO NOT manually decode or verify it in frontend

    // OPTIONAL: store raw token if you want to pass to backend later
    sessionStorage.setItem("google_token", response.credential);

    alert("Login successful!");

    // redirect to dashboard (uncomment when ready)
    // window.location.href = "dashboard.html";
}

/* INIT GOOGLE SIGN-IN */
function initGoogle() {
    if (!window.google) {
        console.error("Google Identity Services failed to load.");
        return;
    }

    google.accounts.id.initialize({
        client_id: CLIENT_ID,
        callback: handleCredentialResponse
    });

    google.accounts.id.renderButton(
        document.getElementById("googleBtn"),
        {
            theme: "filled_blue",
            size: "large",
            shape: "pill"
        }
    );

    google.accounts.id.prompt();
}
</script>

</body>
</html>
