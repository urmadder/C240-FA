<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Chat</title>

<link rel="stylesheet" href="css/dashboard.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

.chat-container{
    display:flex;
    flex-direction:column;
    height:calc(100vh - 120px);
    background:#f4f6fb;
    border-radius:15px;
    padding:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.chat-box{
    flex:1;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:15px;
    padding-right:5px;
}

/* Shared message styling */
.message{
    max-width:75%;
    padding:14px 18px;
    border-radius:18px;
    line-height:1.6;
    word-wrap:break-word;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

/* AI message */
.bot{
    background:#ffffff;
    color:#1f2937;
    align-self:flex-start;
    border-top-left-radius:6px;
}

/* User message */
.user{
    background:#4f46e5;
    color:#ffffff;
    align-self:flex-end;
    border-top-right-radius:6px;
}

.chat-input{
    display:flex;
    gap:12px;
    margin-top:20px;
}

.chat-input input{
    flex:1;
    padding:14px 16px;
    border-radius:12px;
    border:1px solid #d1d5db;
    font-size:16px;
    outline:none;
    background:white;
}

.chat-input input:focus{
    border-color:#4f46e5;
}

.chat-input button{
    padding:14px 24px;
    border:none;
    background:#4f46e5;
    color:white;
    border-radius:12px;
    cursor:pointer;
    transition:.2s;
    font-weight:600;
}

.chat-input button:hover{
    background:#4338ca;
}

/* Scrollbar */
.chat-box::-webkit-scrollbar{
    width:8px;
}

.chat-box::-webkit-scrollbar-thumb{
    background:#c7c7c7;
    border-radius:10px;
}

.chat-box::-webkit-scrollbar-track{
    background:transparent;
}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">

<h2>📚 AI Planner</h2>

<ul>
<li onclick="window.location.href='dashboard.html'">🏠 Dashboard</li>
<li id="timetable">📅 Timetable</li>
<li onclick="window.location.href='add-exam.html'">➕ Add Exam</li>
<li class="active">💬 AI Chat</li>
<li>📖 Resources</li>
<li>📜 History</li>
<li>⚙️ Settings</li>
<li id="logout">🚪 Logout</li>
</ul>

</div>

<div class="main">

<header>

<h1 id="welcomeMessage">AI Study Assistant</h1>

<p>Ask anything about studying, revision plans or your exams.</p>

</header>

<div class="chat-container">

<div class="chat-box" id="chatBox">

<div class="message bot">
👋 Hello! I'm your AI Study Assistant.

How can I help you today?
</div>

</div>

<div class="chat-input">

<input
type="text"
id="userInput"
placeholder="Ask me anything..."
>

<button id="sendBtn">
Send
</button>

</div>

</div>

</div>

</div>

<script>

document.addEventListener("DOMContentLoaded",()=>{

const token=sessionStorage.getItem("google_token");

if(!token){
window.location.href="login.html";
return;
}

function parseJwt(token){
try{
return JSON.parse(atob(token.split(".")[1]));
}catch{
return null;
}
}

const user=parseJwt(token);

if(user){
document.getElementById("welcomeMessage").textContent=
`Hello ${user.name || user.email} 👋`;
}

document.getElementById("logout").onclick=()=>{
sessionStorage.removeItem("google_token");
window.location.href="login.html";
};

document.getElementById("timetable").onclick=()=>{
window.open("https://calendar.google.com/","_blank");
};

const chatBox=document.getElementById("chatBox");
const input=document.getElementById("userInput");
const send=document.getElementById("sendBtn");

function sendMessage(){

const text=input.value.trim();

if(text==="") return;

chatBox.innerHTML+=`
<div class="message user">
${text}
</div>
`;

input.value="";

chatBox.innerHTML+=`
<div class="message bot">
Thinking...
</div>
`;

chatBox.scrollTop=chatBox.scrollHeight;

}

send.onclick=sendMessage;

input.addEventListener("keypress",(e)=>{
if(e.key==="Enter"){
sendMessage();
}
});

});

</script>

</body>
</html>
