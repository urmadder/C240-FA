<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Chat</title>

<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/theme.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

.chat-container{
    display:flex;
    flex-direction:column;
    height:80vh;
    background:#111827;
    border-radius:20px;
    overflow:hidden;
    border:1px solid #374151;
}

.chat-header{
    padding:20px;
    background:#1e293b;
    border-bottom:1px solid #374151;
}

.chat-header h2{
    font-size:22px;
}

.chat-box{
    flex:1;
    overflow-y:auto;
    padding:25px;
    display:flex;
    flex-direction:column;
    gap:20px;
}

.message{
    max-width:75%;
    padding:15px 18px;
    border-radius:18px;
    line-height:1.6;
}

.bot{
    align-self:flex-start;
    background:#1e293b;
    color:white;
    border:1px solid #374151;
}

.user{
    align-self:flex-end;
    background:#2563eb;
    color:white;
}

.chat-input{
    display:flex;
    padding:20px;
    gap:15px;
    background:#1e293b;
}

.chat-input textarea{
    flex:1;
    background:#0f172a;
    border:1px solid#374151;
    color:white;
    padding:15px;
    border-radius:12px;
    resize:none;
    font-family:Inter, sans-serif;
    min-height:50px;
    max-height:150px;
}

.chat-input button{
    background:#2563eb;
    color:white;
    border:none;
    border-radius:12px;
    padding:15px 25px;
    cursor:pointer;
}

</style>

</head>


<body>


<div class="container">


<div class="sidebar">

<h2>📚 AI Planner</h2>

<ul>

<li onclick="window.location.href='dashboard.html'">
🏠 Dashboard
</li>

<li id="timetable">
📅 Timetable
</li>



<li class="active">
💬 AI Chat
</li>



<li onclick="window.location.href='history.html'">
📜 History
</li>

<li onclick="window.location.href='settings.html'">
⚙️ Settings
</li>

<li id="logout">
🚪 Logout
</li>

</ul>

</div>



<div class="main">


<h1 id="welcomeMessage">
AI Study Assistant 👋
</h1>


<p style="margin-bottom:25px;color:#94a3b8;">
Ask me anything about studying, revision, exams or productivity.
</p>



<div class="chat-container">


<div class="chat-header">

<h2>🤖 AI Assistant</h2>

</div>



<div class="chat-box" id="chatBox">


<div class="message bot">

👋 Hi! I'm your AI Study Assistant.

Ask me anything about your studies.

</div>


</div>



<div class="chat-input">

<textarea
id="userInput"
placeholder="Message AI Study Assistant..."
rows="1"
></textarea>

<input
type="file"
id="pdfFile"
accept=".pdf"
>

<button id="sendBtn">
Send
</button>

</div>


</div>


</div>


</div>



<script src="js/main.js"></script>

<script src="js/notifications.js"></script>

<script type="module">

import { auth, db } from "./js/firebase.js";

import {
    onAuthStateChanged,
    signOut
}
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

import {
    collection,
    addDoc,
    getDocs,
    query,
    orderBy
}
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

document.addEventListener("DOMContentLoaded",()=>{


const AI_WEBHOOK_URL = "https://n8ngc.codeblazar.org/webhook/chat";



// Firebase authentication
onAuthStateChanged(auth,(user)=>{

    if(!user){

        window.location.href="login.html";
        return;

    }

    document.getElementById("welcomeMessage").textContent =
    `Hello ${user.displayName || user.email} 👋`;

});



// Google Calendar link
document.getElementById("timetable").onclick = ()=>{

    window.location.href="https://calendar.google.com/";

};



// Logout
document.getElementById("logout").onclick = async()=>{

    await signOut(auth);
    window.location.href="login.html";

};



// Chat elements
const chatBox = document.getElementById("chatBox");
const input = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");
const pdfFile = document.getElementById("pdfFile");



// Send message function
async function sendMessage(){

    const text = input.value.trim();

    // Don't send if both message and file are empty
    if(text === "" && (!pdfFile || pdfFile.files.length === 0)) return;

    sendBtn.disabled = true;
    sendBtn.textContent = "Thinking...";

    // Display user message
   let userMessage = text;

    if (pdfFile && pdfFile.files.length > 0) {
    userMessage += `<br>📎 ${pdfFile.files[0].name}`;
}
const user = auth.currentUser;

if (user) {
    await addDoc(
        collection(db, "users", user.uid, "chats"),
        {
            role: "user",
            message: userMessage,
            timestamp: new Date()
        }
    );
}



    // Loading message
    chatBox.innerHTML += `

    <div class="message bot" id="loadingMessage">

    Thinking...

    </div>

    `;

    chatBox.scrollTop = chatBox.scrollHeight;


    try{

        // Create FormData
        const formData = new FormData();

        formData.append(
    "message",
    text || "Read the uploaded study material and help me study it."
);

        // Send Firebase user information
        if(auth.currentUser){
            formData.append("uid", auth.currentUser.uid);
            formData.append("name", auth.currentUser.displayName || "");
            formData.append("email", auth.currentUser.email || "");
        }

        // Send uploaded file
        if(pdfFile && pdfFile.files.length > 0){

    const file = pdfFile.files[0];

    if(file.type !== "application/pdf"){
        alert("Only PDF files are allowed.");
        sendBtn.disabled = false;
        sendBtn.textContent = "Send";
        return;
    }

    formData.append("file", file);
}


        const response = await fetch(
            AI_WEBHOOK_URL,
            {
                method:"POST",
                body:formData
            }
        );


        // Receive JSON from n8n
        const data = await response.json();


        const loading = document.getElementById("loadingMessage");

        if(loading){
            loading.remove();
        }


        // Display AI response
        chatBox.innerHTML += `

        <div class="message bot">

        ${data.output
            .replace(/\*\*(.*?)\*\*/g,"<b>$1</b>")
            .replace(/### (.*?)/g,"<b>$1</b>")
            .replace(/\n/g,"<br>")}

        </div>

        `;
        const user = auth.currentUser;

if (user) {
    await addDoc(
        collection(db, "users", user.uid, "chats"),
        {
            role: "assistant",
            message: data.output,
            timestamp: new Date()
        }
    );
}


        // Clear inputs
        input.value = "";

        if(pdfFile){
            pdfFile.value = "";
        }
        sendBtn.disabled = false;
        sendBtn.textContent = "Send";

    }

    catch(error){
        sendBtn.disabled = false;
        sendBtn.textContent = "Send";

        const loading = document.getElementById("loadingMessage");

        if(loading){
            loading.remove();
        }

        chatBox.innerHTML += `

        <div class="message bot">

        ❌ Unable to connect to AI assistant.

        </div>

        `;

        console.error(error);

    }

    chatBox.scrollTop = chatBox.scrollHeight;

}



// Send button
sendBtn.onclick = sendMessage;



// Press Enter to send
input.addEventListener("keydown",(e)=>{

    // Enter = send message
    if(e.key === "Enter" && !e.shiftKey){
        e.preventDefault();
        sendMessage();
    }

    // Shift + Enter = new line
});


});

</script>

</body>

</html>
