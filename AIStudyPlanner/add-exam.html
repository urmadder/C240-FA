<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Exam</title>

<link rel="stylesheet" href="css/add-exam.css">
<link rel="stylesheet" href="css/theme.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <div class="main">

        <a href="dashboard.html" class="back-btn">← Back to Dashboard</a>

        <header>
            <h1>Add Exam 📝</h1>
            <p>Enter your exam details so the AI planner can generate a better study timetable.</p>
        </header>

        <div class="exam-card">

            <div class="exam-card-header">
                <h2>Exam Details</h2>
                <p>This information will be saved into Google Sheets through n8n.</p>
            </div>

            <form id="examForm">

                <div class="form-grid">

                    <div class="form-group">
                        <label for="module">Module Name</label>
                        <input 
                            type="text" 
                            id="module" 
                            name="module" 
                            placeholder="Cloud Security"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="priority">Priority</label>
                        <select id="priority" name="priority" required>
                            <option value="">Select priority</option>
                            <option value="High">High</option>
                            <option value="Medium">Medium</option>
                            <option value="Low">Low</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="confidence">Confidence Level</label>
                        <select id="confidence" name="confidence" required>
                            <option value="">Select confidence level</option>
                            <option value="High">High (I understand this well)</option>
                            <option value="Medium">Medium (Need some revision)</option>
                            <option value="Low">Low (Need lots of practice)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="examDate">Exam Date</label>
                        <input 
                            type="date" 
                            id="examDate" 
                            name="examDate"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="examTime">Exam Time</label>
                        <input 
                            type="time" 
                            id="examTime" 
                            name="examTime"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="duration">Duration</label>
                        <input 
                            type="text" 
                            id="duration" 
                            name="duration" 
                            placeholder="2 hours"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="venue">Venue</label>
                        <input 
                            type="text" 
                            id="venue" 
                            name="venue" 
                            placeholder="E35A"
                        >
                    </div>

                    <div class="form-group full-width">
                        <label for="topics">Topics to Revise</label>
                        <textarea 
                            id="topics" 
                            name="topics" 
                            placeholder="IAM, encryption, firewalls, network attacks..."
                        ></textarea>
                    </div>

                    <div class="form-group full-width">
                        <label for="notes">Extra Notes</label>
                        <textarea 
                            id="notes" 
                            name="notes" 
                            placeholder="Example: I am weaker at encryption and need more practice questions."
                        ></textarea>
                    </div>

                </div>

                <div class="button-row">
                    <button type="submit" class="primary-btn">Save Exam</button>
                    <button type="reset" class="secondary-btn">Clear</button>
                </div>

                <p id="statusMessage" class="status-message"></p>
                
                <div id="timetableOutput" class="timetable-output" style="display: none; margin-top: 25px; padding: 20px; border: 1px solid #2ecc71; background: #1a233a; border-radius: 8px; text-align: left;">
                    <h3 style="margin-top: 0; color: #fff; border-bottom: 1px solid #2d3d5a; padding-bottom: 10px; font-size: 1.2rem;">🗓️ Your AI Study Timetable</h3>
                    <div id="timetableContent" style="white-space: pre-wrap; font-family: 'Inter', sans-serif; line-height: 1.6; color: #cbd5e1; margin-top: 15px; font-size: 0.95rem;"></div>
                </div>

            </form>

        </div>

    </div>

</div>

<script src="js/main.js"></script>
<script src="js/notifications.js"></script>
<script type="module" src="js/add-exam.js"></script>

</body>
</html>
